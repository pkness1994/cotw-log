<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CotW Ultimate Console | THE WOLVES' LOG</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* --- Heinlein's Aesthetic & Color System --- */
        :root {
            /* Basic Colors */
            --kain-white: #f4f4f4;   /* 怜悧な白 */
            --kain-blue: #003399;    /* 秩序の青（深淵） */
            --kain-blue-hov: #0044cc; /* 青の活性化状態 */
            --kain-gold: #c5a059;    /* 覇道の金 */
            --kain-gold-hov: #d5b069; /* 金の活性化状態 */
            --kain-dark: #111;       /* 支配の黒 */
            --kain-dark-card: #1a1a1a; /* データ領域の黒 */
            
            /* Status Colors */
            --win-color: #2ecc71;   /* 勝利の緑 */
            --lose-color: #e74c3c;  /* 敗北の赤 */
            
            /* Attribute Category Colors (Visualized Problems) */
            --cat-tech: #e74c3c;    /* 技術・反復（赤）：己の鍛錬不足 */
            --cat-def: #2ecc71;     /* 防御・判断（緑）：精神の揺らぎ */
            --cat-know: #3498db;    /* 知識・対策（青）：思考の怠慢 */
            --cat-exp: #9b59b6;     /* 立ち回り・経験（紫）：戦術の深み */
            
            /* Border & Font Styles */
            --border-style: 1px solid #333;
            --border-style-gold: 1px solid var(--kain-gold);
            --font-family: 'Helvetica Neue', 'Arial', sans-serif;
            --font-main: 'Segoe UI', sans-serif;
        }

        /* --- Global Reset & Body --- */
        body {
            background-color: var(--kain-dark);
            color: var(--kain-white);
            font-family: var(--font-family);
            margin: 0;
            padding: 20px;
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        /* --- Main Container --- */
        .container {
            max-width: 1100px;
            margin: 0 auto;
            border: var(--border-style-gold);
            padding: 30px;
            background: linear-gradient(145deg, #1d1d1d, var(--kain-dark));
            box-shadow: 0 0 40px rgba(197, 160, 89, 0.15);
            border-radius: 4px;
        }

        /* --- Headers --- */
        h1 {
            color: var(--kain-gold);
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 5px;
            border-bottom: 3px solid var(--kain-blue);
            padding-bottom: 20px;
            margin-top: 0;
            margin-bottom: 30px;
            font-size: 2.2em;
        }

        h3 {
            color: var(--kain-white);
            font-size: 1.2em;
            margin-top: 0;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        /* --- Section Styling --- */
        .section-label {
            display: block;
            margin: 25px 0 10px;
            color: var(--kain-gold);
            font-weight: bold;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-left: 3px solid var(--kain-blue);
            padding-left: 10px;
        }

        /* --- Form Elements & Layout --- */
        .form-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr) 1.2fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        select, textarea, input[type="date"], input[type="number"] {
            width: 100%;
            padding: 14px;
            background: #222;
            border: 1px solid #444;
            color: var(--kain-white);
            box-sizing: border-box;
            font-size: 0.95em;
            transition: 0.2s border-color, 0.2s box-shadow;
            border-radius: 2px;
        }

        select:focus, textarea:focus, input:focus {
            border-color: var(--kain-gold);
            outline: none;
            box-shadow: 0 0 10px rgba(197, 160, 89, 0.3);
        }

        .score-input {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .score-input input {
            width: 50px;
            text-align: center;
            font-size: 1.3em;
            font-weight: bold;
            background: #1a1a1a;
            border: 1px solid #555;
            color: var(--kain-white);
        }

        textarea {
            resize: vertical;
            margin-top: 10px;
        }

        /* --- Reason Category Area --- */
        .reason-container {
            background: #222;
            border: 1px solid #444;
            max-height: 400px;
            overflow-y: auto;
            padding: 20px;
            border-radius: 2px;
        }

        .reason-group {
            margin-bottom: 18px;
        }

        .group-title {
            font-size: 0.75em;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 3px;
            margin-bottom: 8px;
            display: inline-block;
            text-transform: uppercase;
            color: #fff;
        }

        .reason-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
        }

        .reason-item {
            display: flex;
            align-items: center;
            font-size: 0.8em;
            cursor: pointer;
            padding: 6px;
            border-radius: 3px;
            transition: 0.2s background;
            position: relative; /* For Tooltip */
        }

        .reason-item:hover {
            background: #333;
        }

        .reason-item input {
            width: auto;
            margin-right: 10px;
            cursor: pointer;
        }

        /* --- Kai's Tooltip Implementation (Showing Explanations) --- */
        .reason-item[data-tooltip]::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 125%;
            left: 50%;
            transform: translateX(-50%);
            background-color: var(--kain-dark);
            color: var(--kain-white);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.75em;
            white-space: nowrap;
            z-index: 10;
            opacity: 0;
            pointer-events: none;
            transition: 0.2s opacity;
            border: var(--border-style-gold);
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .reason-item[data-tooltip]::before {
            content: "";
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px;
            border-style: solid;
            border-color: var(--kain-gold) transparent transparent transparent;
            z-index: 10;
            opacity: 0;
            transition: 0.2s opacity;
        }

        .reason-item:hover[data-tooltip]::after,
        .reason-item:hover[data-tooltip]::before {
            opacity: 1;
        }

        /* --- Buttons --- */
        button.main-btn {
            width: 100%;
            padding: 20px;
            background-color: var(--kain-blue);
            color: var(--kain-white);
            border: none;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.3em;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-top: 20px;
            transition: 0.3s background-color, 0.3s box-shadow;
            border-radius: 3px;
        }

        button.main-btn:hover {
            background-color: var(--kain-blue-hov);
            box-shadow: 0 0 15px var(--kain-blue);
        }

        button.main-btn:disabled {
            background-color: #555;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* --- Filter Area --- */
        .filter-box {
            background: #111;
            border: 1px solid var(--kain-blue);
            padding: 20px;
            margin-top: 30px;
            display: flex;
            gap: 20px;
            align-items: center;
            border-radius: 3px;
            flex-wrap: wrap;
        }

        .filter-label {
            color: var(--kain-gold);
            font-weight: bold;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .filter-box select, .filter-box input[type="date"] {
            width: auto;
            padding: 10px;
            font-size: 0.9em;
            border-color: #555;
        }

        /* --- Analytics Visuals (Cards, Charts, Tables) --- */
        .analytics-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 25px;
            margin-top: 30px;
        }

        .chart-container {
            background: var(--kain-dark-card);
            padding: 25px;
            border: var(--border-style);
            border-radius: 4px;
        }

        .opp-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
            background: var(--kain-dark-card);
        }

        .opp-table th, .opp-table td {
            padding: 12px;
            border-bottom: 1px solid #333;
            text-align: center;
        }

        .opp-table th {
            color: var(--kain-gold);
            background: #222;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.85em;
        }

        /* --- Combat Log Section --- */
        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 50px;
            border-bottom: 1px solid #333;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }

        .log-entry {
            border-left: 5px solid var(--kain-gold);
            background: rgba(34, 34, 34, 0.8);
            padding: 18px;
            margin-bottom: 12px;
            border-radius: 2px;
            transition: 0.2s background;
        }

        .log-entry:hover {
            background: rgba(45, 45, 45, 0.9);
        }

        .log-main {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .rank-badge {
            font-size: 0.8em;
            padding: 3px 6px;
            border-radius: 3px;
            background: #444;
            color: #fff;
            margin-right: 8px;
            border: 1px solid #555;
        }

        .res-text {
            font-size: 1.1em;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Result Colors */
        .res-win { color: var(--win-color); }
        .res-lose { color: var(--lose-color); }

        .note-text {
            font-size: 0.9em;
            color: #ccc;
            line-height: 1.5;
            margin-top: 10px;
            border-top: 1px dotted #555;
            padding-top: 8px;
        }

        .date-text {
            color: #888;
            font-size: 0.8em;
            float: right;
            margin-top: 5px;
        }

        /* --- Attribute Tag Colors in Log --- */
        .reason-tag {
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 0.75em;
            margin-right: 5px;
            color: white;
            border: none;
            display: inline-block;
            text-transform: uppercase;
            font-weight: bold;
        }

        .tag-tech { background-color: var(--cat-tech); }
        .tag-def { background-color: var(--cat-def); }
        .tag-know { background-color: var(--cat-know); }
        .tag-exp { background-color: var(--cat-exp); }
    </style>
</head>
<body>
<div class="container">
    <h1>Combat Analysis Console</h1>
    
    <div id="input-form">
        <div class="form-grid">
            <div><label class="section-label">自キャラ</label><select id="my-char"></select></div>
            <div><label class="section-label">対戦相手</label><select id="opp-char"></select></div>
            <div><label class="section-label">相手ランク</label>
                <select id="opp-rank">
                    <option value="ルーキー">ルーキー</option><option value="アイアン">アイアン</option>
                    <option value="ブロンズ">ブロンズ</option><option value="シルバー">シルバー</option>
                    <option value="ゴールド">ゴールド</option><option value="プラチナ">プラチナ</option>
                    <option value="ダイアモンド">ダイアモンド</option><option value="レジェンド">レジェンド</option>
                    <option value="ワイルドレジェンド">ワイルドレジェンド</option><option value="餓狼">餓狼</option>
                </select>
            </div>
            <div><label class="section-label">結果</label><select id="result"><option value="WIN">WIN</option><option value="LOSE" selected>LOSE</option></select></div>
            <div><label class="section-label">スコア</label><div class="score-input"><input type="number" id="my-score" value="0" min="0" max="2"> <span>-</span> <input type="number" id="opp-score" value="2" min="0" max="2"></div></div>
        </div>

        <label class="section-label">敗因（真実を複数選択せよ）</label>
        <div class="reason-container" id="reason-container">
            </div>

        <label class="section-label">思考の記録（戦術メモ）</label>
        <textarea id="note" rows="3" placeholder="勝利あっての真実……。次に活かすべき気付きを記せ。"></textarea>
        
        <button class="main-btn" onclick="saveMatch()">記録をクラウドに刻む</button>
    </div>

    <div class="filter-box">
        <span class="filter-label">Analysis Filter:</span>
        <select id="filter-my" onchange="render()"><option value="ALL">ALL CHARS</option></select>
        <input type="date" id="filter-start" onchange="render()">
        <span>～</span>
        <input type="date" id="filter-end" onchange="render()">
    </div>

    <div class="analysis-grid">
        <div class="chart-container">
            <h3 style="color:var(--kain-gold); text-align:center;">属性別 敗因分布</h3>
            <canvas id="reasonChart"></canvas>
        </div>
        <div class="chart-container">
            <h3 style="color:var(--kain-gold); text-align:center;">対戦相手別戦績</h3>
            <table class="opp-table">
                <thead><tr><th>相手</th><th>試合数</th><th>勝率</th><th>平均スコア</th></tr></thead>
                <tbody id="opp-stats-body"></tbody>
            </table>
        </div>
    </div>

    <div class="log-header">
        <h3>COMBAT LOG</h3>
        <button onclick="clearData()" style="background:none; border:none; color:#666; cursor:pointer; font-size:0.7em;">抹消</button>
    </div>
    <div id="history"></div>
</div>

<script>
    // --- 1. GASのウェブアプリURLをここに貼り付けよ ---
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzUbVDVYicVG9zeuwT5i6LIQsutG2qz8DetCFkmuY6hw1a22sNqjJqicB2A98Qra7BXFw/exec"; 

    // --- Characters ---
    const chars = [
        "ロック", "テリー", "カイン", "B・ジェニー", "ボックス・リーパー", "ケビン・ライアン", 
        "ビリー・カーン", "不知火舞", "キム・ドンファン", "牙刀", "北斗丸", "アンディ・ボガード", 
        "ジョー・東", "キム・ジェイフン", "ギース・ハワード", "ブルー・マリー", "ヴォルフガング・クラウザー", 
        "ケン・マスターズ", "春麗", "C・ロナウド", "S・ガナッチ", "双葉ほたる", "グリフォンマスク", 
        "プリチャ", "マルコ", "Mr.BIG"
    ].sort();
    
    // --- Reason Categories (Grouped with Tooltips) ---
    const reasonGroups = [
        { label: "技術・反復（赤）", color: "#e74c3c", class: "tag-tech", 
          items: [
              ["操作ミス", "コマンドミスや意図しない技"],
              ["起き攻めミス", "技の重ねやセットプレイの失敗"],
              ["対空失敗", "相手のジャンプを落とせなかった"],
              ["コンボミス", "ダメージチャンスを逃した"],
              ["ヒット確認ミス", "単発確認や小技からの判断不足"],
              ["仕込みミス", "ガーキャン仕込みや投げ抜け仕込みなどのミス"]
          ] },
        { label: "防御・判断（緑）", color: "#2ecc71", class: "tag-def", 
          items: [
              ["投げられすぎ", "投げぬけ失敗や捨てすぎ"],
              ["画面端の守備", "端で凌ぎきれず押し切られた"],
              ["無謀な暴れ", "相手が有利な時にボタンを押した"],
              ["ガードミス", "中下段や切り替えのミス"],
              ["パニック/ぶっぱ", "焦って無敵技やボタンを押した"],
              ["確反逃し", "反撃確定なのに技が出せなかった"]
          ] },
        { label: "知識・対策（青）", color: "#3498db", class: "tag-know", 
          items: [
              ["確反の知識不足", "どの技に反撃が入るか不明"],
              ["わからん殺し", "技の性能や対処法を知らなかった"],
              ["セットプレイ対策不足", "特定キャラの連携が抜けられなかった"],
              ["システム理解不足", "REVブロウ等の使いどころの誤り"]
          ] },
        { label: "立ち回り・経験（紫）", color: "#9b59b6", class: "tag-exp", 
          items: [
              ["安易な飛び", "無計画に飛んで落とされた"],
              ["対応不足", "相手の行動・癖に対処できなかった"],
              ["立ち回り負け", "差し合いで一方的に触られた"],
              ["行動の偏り/手癖", "同じ行動を繰り返して読まれた"],
              ["読み負け・運", "最後のじゃんけんや読み合いの負け"],
              ["リソース管理", "オーバーヒートや使いどころのミス"]
          ] }
    ];

    let matches = JSON.parse(localStorage.getItem('cotw_matches')) || [];
    let reasonChart = null;

    // --- System Initialization ---
    function init() {
        const mySelect = document.getElementById('my-char'), oppSelect = document.getElementById('opp-char'), filterMySelect = document.getElementById('filter-my');
        chars.forEach(c => { 
            mySelect.add(new Option(c, c)); oppSelect.add(new Option(c, c)); filterMySelect.add(new Option(c, c)); 
        });
        mySelect.value = "カイン"; // Default as Hainlein

        // Generate Reason Option Grid (Grouped by Category)
        const container = document.getElementById('reason-container');
        reasonGroups.forEach(group => {
            const groupDiv = document.createElement('div');
            groupDiv.className = 'reason-group';
            groupDiv.innerHTML = `<div class="group-title" style="background:${group.color}">${group.label}</div>`;
            const grid = document.createElement('div');
            grid.className = 'reason-grid';
            group.items.forEach(([title, desc]) => {
                grid.innerHTML += `<label class="reason-item" data-tooltip="${desc}"><input type="checkbox" name="r-check" value="${title}" data-class="${group.class}"> ${title}</label>`;
            });
            groupDiv.appendChild(grid);
            container.appendChild(groupDiv);
        });
        render(); // Initial Render
    }

    // --- Save Match Record (Save both locally and sync to cloud) ---
    async function saveMatch() {
        const checkboxes = document.querySelectorAll('input[name="r-check"]:checked');
        const selectedReasons = Array.from(checkboxes).map(cb => ({ title: cb.value, class: cb.dataset.class }));
        const now = new Date();
        
        const match = {
            id: Date.now(),
            my: document.getElementById('my-char').value, opp: document.getElementById('opp-char').value,
            rank: document.getElementById('opp-rank').value, res: document.getElementById('result').value,
            myS: parseInt(document.getElementById('my-score').value), oppS: parseInt(document.getElementById('opp-score').value),
            reasons: selectedReasons, note: document.getElementById('note').value,
            date: now.toLocaleString('ja-JP'), isoDate: now.toISOString()
        };
        const btn = document.querySelector('.main-btn'); btn.disabled = true; btn.innerText = "同期中...";

        try {
            await fetch(GAS_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(match) });
            matches.unshift(match); localStorage.setItem('cotw_matches', JSON.stringify(matches));
            document.getElementById('note').value = '';
            checkboxes.forEach(cb => cb.checked = false);
            render();
            console.log("勝利の軌跡、あるいは敗北の真実をクラウドへ刻んだ。");
        } catch (e) { console.error(e); alert("通信障害発生。ローカルのみ記録。"); } 
        finally { btn.disabled = false; btn.innerText = "記録をクラウドに刻む"; }
    }

    // --- Render Analytics Visuals & Log (Filtered by options) ---
    function render() {
        const fMy = document.getElementById('filter-my').value, fStart = document.getElementById('filter-start').value, fEnd = document.getElementById('filter-end').value;

        // Filter based on options
        const filtered = matches.filter(m => {
            const d = new Date(m.isoDate || m.id);
            return (fMy === "ALL" || m.my === fMy) && (!fStart || d >= new Date(fStart + "T00:00:00")) && (!fEnd || d <= new Date(fEnd + "T23:59:59"));
        });

        let groupCounts = { tech: 0, def: 0, know: 0, exp: 0 }, oStats = {};

        filtered.forEach(m => {
            // Reasons aggregation (Loss Reasons only)
            if(m.res === 'LOSE') {
                m.reasons.forEach(r => {
                    if (r.class === 'tag-tech') groupCounts.tech++;
                    if (r.class === 'tag-def') groupCounts.def++;
                    if (r.class === 'tag-know') groupCounts.know++;
                    if (r.class === 'tag-exp') groupCounts.exp++;
                });
            }
            // Opponent aggregation
            if(!oStats[m.opp]) oStats[m.opp] = {w:0, l:0, ms:0, os:0};
            if(m.res === 'WIN') oStats[m.opp].w++; else oStats[m.opp].l++;
            oStats[m.opp].ms += m.myS; oStats[m.opp].os += m.oppS;
        });

        // 1. Attribute Doughnut Chart update
        updateChart(groupCounts);

        // 2. Opponent Stats Table update
        const tbody = document.getElementById('opp-stats-body'); tbody.innerHTML = '';
        Object.keys(oStats).forEach(o => {
            const s = oStats[o], total = s.w+s.l, wr = ((s.w/total)*100).toFixed(1);
            tbody.innerHTML += `<tr><td>${o}</td><td>${total}</td><td style="color:${wr>=50?'var(--win-color)':'var(--lose-color)'}">${wr}%</td><td>${(s.ms/total).toFixed(1)}-${(s.os/total).toFixed(1)}</td></tr>`;
        });

        // 3. Combat Log Update
        const hist = document.getElementById('history'); hist.innerHTML = '';
        filtered.forEach(m => {
            const resultClass = m.res === 'WIN' ? 'res-win' : 'res-lose';
            hist.innerHTML += `<div class="log-entry">
                <div class="log-main">
                    <strong>${m.my} vs <span class="rank-badge">${m.rank}</span>${m.opp} (${m.myS}-${m.oppS})</strong>
                    <span class="res-text ${resultClass}">${m.res}</span>
                </div>
                <div style="margin:8px 0;">${m.reasons.map(r => `<span class="reason-tag ${r.class}">${r.title}</span>`).join('')}</div>
                <div class="note-text">${m.note ? m.note : '思考の記録なし'}</div>
                <div class="date-text">${m.date}</div>
                <div style="clear:both;"></div>
            </div>`;
        });
    }

    // --- Update Chart Visual (Chart.js) ---
    function updateChart(counts) {
        const ctx = document.getElementById('reasonChart').getContext('2d');
        if (reasonChart) reasonChart.destroy();
        reasonChart = new Chart(ctx, { 
            type: 'doughnut', 
            data: { 
                labels: ["技術・反復", "防御・判断", "知識・対策", "立ち回り・経験"], 
                datasets: [{ 
                    data: [counts.tech, counts.def, counts.know, counts.exp], 
                    backgroundColor: ['#e74c3c', '#2ecc71', '#3498db', '#9b59b6'], 
                    borderWidth: 0 
                }] 
            }, 
            options: { 
                plugins: { 
                    legend: { position: 'bottom', labels: { color: '#f4f4f4', font: { size: 11 } } } 
                },
                cutout: '70%', // Make it sleek
                elements: { arc: { borderJoinStyle: 'round' } }
            } 
        });
    }

    // --- Clear Local Data (for testing/resetting) ---
    function clearData() { if(confirm('全記録を消去するか？負けて得る物があるなどというまやかしを信じぬ覚悟、見せてもらうぞ。')) { matches=[]; localStorage.removeItem('cotw_matches'); render(); } }
    
    // --- Page Load Event ---
    window.onload = init;
</script>
</body>
</html>
